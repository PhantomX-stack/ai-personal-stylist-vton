version: '3.8'

services:
  # Backend FastAPI service
  backend:
    container_name: ai-stylist-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://frontend:3000
      - PYTHON_ENV=development
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on: []
    networks:
      - ai-stylist-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React service
  frontend:
    container_name: ai-stylist-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - ai-stylist-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ai-stylist-network:
    driver: bridge

# Volume for persistent data (optional)
volumes:
  backend-data:
