<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AI Personal Stylist - PhantomX</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .chat-window { bottom: 80px; right: 20px; width: 350px; height: 450px; }
        .hidden { display: none; }
    </style>
</head>
<body class='bg-gray-50'>
    <header class='gradient-bg text-white p-6 shadow-lg'>
        <div class='container mx-auto flex justify-between items-center'>
            <h1 class='text-2xl font-bold'>AI Stylist ✨</h1>
            <nav class='space-x-6'><a href='#'>Home</a><a href='#'>Virtual Try-On</a></nav>
        </div>
    </header>
    <main class='container mx-auto mt-12 px-6 text-center'>
        <h2 class='text-4xl font-bold text-gray-800 mb-4'>Professional AI Wardrobe</h2>
        <div class='grid md:grid-cols-3 gap-8 mt-12'>
            <div class='bg-white p-6 rounded-xl shadow'>Analysis AI</div>
            <div class='bg-white p-6 rounded-xl shadow'>Virtual Try-On</div>
            <div class='bg-white p-6 rounded-xl shadow'>Outfit Planner</div>
        </div>
    </main>
    <footer class='bg-gray-800 text-gray-300 mt-20 py-12'>
        <div class='container mx-auto px-6 text-center'>
            <p>Technology: React, Flask, PyTorch, GPT-4 Vision</p>
            <p>Developer: <a href='https://github.com/PhantomX-stack' class='text-indigo-400'>PhantomX-stack</a></p>
            <p class='text-xs mt-4'>&copy; 2024 AI Personal Stylist. MIT Licensed.</p>
        </div>
    </footer>
    <div id='chat-btn' class='fixed bottom-6 right-6 gradient-bg w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl cursor-pointer shadow-xl'>💬</div>
    <div id='chat-window' class='fixed chat-window bg-white shadow-2xl rounded-2xl border flex flex-col hidden'>
        <div class='gradient-bg p-4 rounded-t-2xl text-white flex justify-between items-center'><span class='font-bold'>AI Assistant</span><button id='close-chat'>&times;</button></div>
        <div id='chat-messages' class='flex-1 p-4 overflow-y-auto space-y-3 text-sm'></div>
        <div class='p-4 border-t flex'><input id='chat-input' class='flex-1 border p-2' placeholder='Ask...'><button id='send-btn' class='p-2 bg-indigo-600 text-white'>Send</button></div>
    </div>
    <script>
        const chatBtn = document.getElementById('chat-btn');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        chatBtn.onclick = () => chatWindow.classList.toggle('hidden');
        closeChat.onclick = () => chatWindow.classList.add('hidden');
        sendBtn.onclick = async () => {
            const msg = chatInput.value;
            if(!msg) return;
            chatMessages.innerHTML += '<div>User: ' + msg + '</div>';
            chatInput.value = '';
            const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg})});
            const data = await res.json();
            chatMessages.innerHTML += '<div>AI: ' + data.reply + '</div>';
        };
    </script>
</body>
</html>
