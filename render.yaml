services:
  - type: web
    name: ai-stylist-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: ai-stylist-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npx http-server dist -p $PORT"
    envVars:
      - key: NODE_VERSION
        value: 18
